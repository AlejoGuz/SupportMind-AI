services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: supportmind
      POSTGRES_PASSWORD: supportmind
      POSTGRES_DB: supportmind
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supportmind"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  api:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    env_file:
      - ../.env.example
    environment:
      DATABASE_URL: postgresql+asyncpg://supportmind:supportmind@postgres:5432/supportmind
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      S3_ENDPOINT_URL: http://minio:9000
      CORS_ORIGINS: http://localhost:5173,http://localhost:5174,http://localhost
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python -m scripts.seed &&
             uvicorn supportmind.main:app --host 0.0.0.0 --port 8000 --reload"

  worker:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://supportmind:supportmind@postgres:5432/supportmind
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      - redis
      - api
    command: celery -A supportmind.infrastructure.messaging.celery_app.celery_app worker -l info -Q default,alerts,sla,ai

  beat:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      - redis
    command: celery -A supportmind.infrastructure.messaging.celery_app.celery_app beat -l info

  web-customer:
    build:
      context: ../apps/web-customer
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api

  web-agent:
    build:
      context: ../apps/web-agent
      dockerfile: Dockerfile
    ports:
      - "5174:80"
    depends_on:
      - api

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - api
      - web-customer
      - web-agent

volumes:
  pgdata:
  miniodata: