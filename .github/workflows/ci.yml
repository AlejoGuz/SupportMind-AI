name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Ruff
        run: ruff check src tests || true
      - name: Pytest
        env:
          PYTHONPATH: src
        run: pytest -q

  web-customer:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web-customer
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web-customer/package-lock.json
      - run: npm ci
      - run: npm run build

  web-agent:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web-agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web-agent/package-lock.json
      - run: npm ci
      - run: npm run build
